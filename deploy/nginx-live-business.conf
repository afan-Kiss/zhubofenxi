# 直播订单经营看板 · Nginx 配置示例
#
# 安装：sudo cp deploy/nginx-live-business.conf /etc/nginx/sites-available/live-business
#       sudo ln -sf /etc/nginx/sites-available/live-business /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 请将下方占位符替换为实际值：
#   YOUR_SERVER_IP      → 公网 IP（或 _ 表示默认）
#   /var/www/live-business-web  → 项目根目录绝对路径

server {
    listen 80;
    # 仅有 IP 时可写 server_name _;  有域名时改为 your-domain.com
    server_name YOUR_SERVER_IP;

    # 前端静态资源（npm run build:web 产出）
    root /var/www/live-business-web/apps/web/dist;
    index index.html;

    client_max_body_size 20m;

    # API 反向代理到 Node（PM2 监听 3001）
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # React Router：除静态资源外回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/live-business-access.log;
    error_log /var/log/nginx/live-business-error.log;
}

# 后续配置 HTTPS 时，可新增 443 server 块，并将 apps/server/.env 中 COOKIE_SECURE 改为 true
# 建议使用 certbot：sudo certbot --nginx -d your-domain.com
